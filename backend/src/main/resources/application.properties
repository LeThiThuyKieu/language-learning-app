# Server Configuration
server.port=8080
spring.application.name=language-learning-app

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/language_learning_app?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8
spring.jpa.properties.hibernate.connection.useUnicode=true

# MongoDB Configuration
spring.data.mongodb.uri=${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017}
spring.data.mongodb.database=language_learning_data

# JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# CORS Configuration
cors.allowed-origins=http://localhost:3000

# File Upload Configuration
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Social Auth Configuration
social.google.client-id=${SOCIAL_GOOGLE_CLIENT_ID:}
social.google.client-secret=${SOCIAL_GOOGLE_CLIENT_SECRET:}
social.facebook.app-id=${SOCIAL_FACEBOOK_APP_ID:}
social.facebook.app-secret=${SOCIAL_FACEBOOK_APP_SECRET:}

# Spring OAuth2 Client Configuration
spring.security.oauth2.client.registration.google.client-id=${social.google.client-id:}
spring.security.oauth2.client.registration.google.client-secret=${social.google.client-secret:}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.facebook.client-id=${social.facebook.app-id:}
spring.security.oauth2.client.registration.facebook.client-secret=${social.facebook.app-secret:}
spring.security.oauth2.client.registration.facebook.scope=email,public_profile
spring.security.oauth2.client.provider.facebook.authorization-uri=https://www.facebook.com/v20.0/dialog/oauth
spring.security.oauth2.client.provider.facebook.token-uri=https://graph.facebook.com/v20.0/oauth/access_token
spring.security.oauth2.client.provider.facebook.user-info-uri=https://graph.facebook.com/v20.0/me?fields=id,name,email
spring.security.oauth2.client.provider.facebook.user-name-attribute=id

# Frontend redirect after OAuth2 login
app.oauth2.redirect-uri=${APP_OAUTH2_REDIRECT_URI:http://localhost:3000/login}

# Logging
logging.level.com.languagelearning=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG

spring.profiles.active=local

